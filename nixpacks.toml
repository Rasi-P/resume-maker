[phases.setup]
aptPkgs = ["texlive-xetex", "texlive-fonts-recommended", "texlive-latex-extra"]

[phases.install]
cmds = [
  "pip install -r backend/requirements.txt",
  "command -v xelatex",
  "xelatex --version"
]

[start]
cmd = "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:${PORT}"