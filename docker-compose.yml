version: "3.9"

services:
  db:
    image: postgres:15
    container_name: resumemaker_db
    restart: always
    environment:
      POSTGRES_DB: resumemaker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: resumemaker_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: resumemaker_backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DB_NAME: resumemaker
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0